project:
  name: mspm0g3507
  type: ti-mspm0
  level: "1.5"

chip:
  vendor: ti
  family: mspm0
  part: MSPM0G3507
  define: __MSPM0G3507__

sdk:
  type: ti-mspm0
  family: mspm0
  env: MSPM0_SDK_PATH
  default_path: ~/SDK/TI/mspm0-sdk

build:
  system: cmake
  generator: ninja
  toolchain: arm-none-eabi-gcc
  build_dir: build
  artifact: build/app.elf
  hex: build/app.hex
  bin: build/app.bin

flash:
  backend: openocd
  adapter: cmsis-dap
  target: mspm0g3507
  scripts_dir: /home/boweny/embedforge/configs/openocd
  target_cfg: target/mspm0.cfg
  artifact: build/app.elf

resources:
  board: LP_MSPM0G3507
  cpuclk_hz: 80000000
  systick_hz: 1000
  uart:
    debug:
      instance: UART0
      baud: 115200
      tx:
        port: GPIOA
        pin: 10
        iomux: IOMUX_PINCM21
      rx:
        port: GPIOA
        pin: 11
        iomux: IOMUX_PINCM22
  spi:
    board:
      instance: SPI1
      sclk_hz: 40000000
      poci:
        port: GPIOB
        pin: 7
        iomux: IOMUX_PINCM24
      pico:
        port: GPIOB
        pin: 8
        iomux: IOMUX_PINCM25
      sck:
        port: GPIOB
        pin: 9
        iomux: IOMUX_PINCM26
  flash:
    onboard:
      chip: W25Q128
      bus: spi.board
      cs:
        port: GPIOB
        pin: 6
        iomux: IOMUX_PINCM23
  lcd:
    onboard:
      controller: ST7789-compatible
      width: 320
      height: 170
      bus: spi.board
      cs:
        port: GPIOB
        pin: 14
        iomux: IOMUX_PINCM31
      reset:
        port: GPIOB
        pin: 10
        iomux: IOMUX_PINCM27
      dc:
        port: GPIOB
        pin: 11
        iomux: IOMUX_PINCM28
      backlight:
        port: GPIOB
        pin: 26
        iomux: IOMUX_PINCM57
  leds:
    user_led_1:
      port: GPIOB
      pin: 22
      iomux: IOMUX_PINCM50
